services:
  - type: web
    name: mission-wlw-practiceq-remote
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.practiceq-remote
    envVars:
      - key: PRACTICEQ_REMOTE_HEADLESS
        value: "true"
      - key: PRACTICEQ_REMOTE_POLL_MS
        value: "5000"
      - key: PRACTICEQ_REMOTE_PUBLIC_URL
        sync: false
      - key: PRACTICEQ_ADMIN_SET_COMPLETED
        value: "true"
      - key: PRACTICEQ_ADMIN_EMAIL
        sync: false
      - key: PRACTICEQ_ADMIN_PASSWORD
        sync: false
      - key: PRACTICEQ_ADMIN_STORAGE_STATE_JSON
        sync: false
      - key: PHARMACY_PROVIDER
        value: appsheet
      - key: USE_REAL_APPSHEET
        value: "true"
      - key: APPSHEET_ID
        sync: false
      - key: APPSHEET_API_KEY
        sync: false
      - key: APPSHEET_BASE_URL
        value: https://www.appsheet.com
      - key: APPSHEET_ORDER_TABLE
        value: OrderItems
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_URL_NON_POOLING
        sync: false
