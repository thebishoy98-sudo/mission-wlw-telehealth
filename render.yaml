databases:
  - name: mission-wlw-postgres
    databaseName: mission_wlw
    user: mission_wlw
    plan: free

services:
  - type: web
    name: mission-wlw-web
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: POSTGRES_URL
        fromDatabase:
          name: mission-wlw-postgres
          property: connectionString
      - key: POSTGRES_URL_NON_POOLING
        fromDatabase:
          name: mission-wlw-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: mission-wlw-postgres
          property: connectionString
      - key: VERCEL_ENV
        value: production

      # Render public URL. Fill this after the first Render web service URL is known.
      - key: APP_BASE_URL
        sync: false

      # Staff/session secrets.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: PROVIDER_EMAIL
        sync: false
      - key: PROVIDER_PASSWORD
        sync: false
      - key: PROVIDER_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false

      # QuickBooks production payment configuration.
      - key: USE_REAL_QUICKBOOKS
        value: true
      - key: BYPASS_QB_PAYMENTS
        value: false
      - key: NEXT_PUBLIC_QB_PAYMENTS_ENABLED
        value: true
      - key: NEXT_PUBLIC_QB_PAYMENTS_ENVIRONMENT
        value: production
      - key: QB_ALLOW_RAW_CARD_CHARGES
        value: false
      - key: QB_CLIENT_ID
        sync: false
      - key: QB_CLIENT_SECRET
        sync: false
      - key: QB_REALM_ID
        sync: false
      - key: QB_REFRESH_TOKEN
        sync: false
      - key: QB_REDIRECT_URI
        value: https://mission-wlw-web.onrender.com/api/auth/qb/callback
      - key: QB_OAUTH_INCLUDE_PAYMENTS
        value: true
      - key: QB_WEBHOOK_VERIFIER_TOKEN
        sync: false
      - key: NEXT_PUBLIC_QB_PAYMENTS_APP_KEY
        sync: false

      # Subscription auto-refill (recurring 8-week billing).
      - key: SUBSCRIPTION_AUTOCHARGE_ENABLED
        value: true
      - key: SUBSCRIPTION_INTERVAL_DAYS
        value: 56
      - key: SUBSCRIPTION_LEAD_DAYS
        value: 7

      # Pharmacy dispatch is routed to LifeFile production.
      - key: PHARMACY_PROVIDER
        value: lifefile
      - key: USE_REAL_LIFEFILE
        value: true
      - key: LIFEFILE_ENVIRONMENT
        value: production
      - key: LIFEFILE_BASE_URL
        value: https://host37a.lifefile.net/lfapi/v1
      - key: LIFEFILE_VENDOR_ID
        sync: false
      - key: LIFEFILE_LOCATION_ID
        sync: false
      - key: LIFEFILE_API_NETWORK_ID
        sync: false
      - key: LIFEFILE_API_USERNAME
        sync: false
      - key: LIFEFILE_API_PASSWORD
        sync: false
      - key: LIFEFILE_PRACTICE_ID
        sync: false
      - key: LIFEFILE_ORDER_ENDPOINT
        sync: false
      - key: LIFEFILE_PRESCRIBER_NPI
        sync: false
      - key: LIFEFILE_PRESCRIBER_LICENSE_STATE
        sync: false
      - key: LIFEFILE_PRESCRIBER_LICENSE_NUMBER
        sync: false
      - key: LIFEFILE_PRESCRIBER_FIRST_NAME
        sync: false
      - key: LIFEFILE_PRESCRIBER_LAST_NAME
        sync: false
      - key: LIFEFILE_PRESCRIBER_EMAIL
        sync: false
      - key: LIFEFILE_SHIPPING_SERVICE_ID
        value: 6230
      - key: LIFEFILE_WEBHOOK_SECRET
        sync: false

      # FedEx direct tracking status polling.
      - key: FEDEX_CLIENT_ID
        sync: false
      - key: FEDEX_CLIENT_SECRET
        sync: false
      - key: FEDEX_API_BASE_URL
        value: https://apis.fedex.com

      # PracticeQ, Spruce, identity, and AI integrations.
      - key: USE_REAL_PRACTICEQ
        value: true
      - key: PRACTICEQ_API_KEY
        sync: false
      - key: PRACTICEQ_BASE_URL
        value: https://intakeq.com/api/v1
      - key: PRACTICEQ_QUESTIONNAIRE_ID
        sync: false
      - key: PRACTICEQ_WEBHOOK_KEY
        sync: false
      - key: PRACTICEQ_ADMIN_EMAIL
        sync: false
      - key: PRACTICEQ_ADMIN_PASSWORD
        sync: false
      - key: PRACTICEQ_ADMIN_SET_COMPLETED
        value: true
      - key: PRACTICEQ_ADMIN_STORAGE_STATE_JSON
        sync: false
      - key: PRACTICEQ_REMOTE_PUBLIC_URL
        value: https://mission-wlw-practiceq-remote.onrender.com
      - key: USE_REAL_SPRUCE
        sync: false
      - key: SPRUCE_AUTH_TOKEN
        sync: false
      - key: SPRUCE_ACCESS_ID
        sync: false
      - key: SPRUCE_API_KEY
        sync: false
      - key: SPRUCE_INTERNAL_ENDPOINT_ID
        sync: false
      - key: SPRUCE_WEBHOOK_SECRET
        sync: false
      - key: SPRUCE_AI_REPLIES
        value: true
      - key: SPRUCE_AI_AUTO_REPLY
        value: true
      - key: SPRUCE_AI_ESCALATION_ACK
        value: true
      - key: SPRUCE_AI_MODEL
        value: claude-haiku-4-5-20251001
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: IDENTITY_STORAGE_PROVIDER
        value: practiceq
      - key: IDENTITY_SANDBOX_AUTO_VERIFY
        value: true

      # Optional AppSheet mirror/tracking support.
      - key: USE_REAL_APPSHEET
        value: "false"
      - key: APPSHEET_ID
        sync: false
      - key: APPSHEET_API_KEY
        sync: false

  # ── Cron jobs ────────────────────────────────────────────────────────────
  # A single hourly "tick" dispatcher runs all daily/hourly jobs (see
  # app/api/cron/tick) so we pay for one cron instead of ~10. pharmacy-tracking
  # stays separate because it needs 15-minute granularity.
  - type: cron
    name: mission-wlw-cron-tick
    runtime: node
    schedule: "0 * * * *"   # hourly
    buildCommand: echo "cron has no build step (uses Node built-ins only)"
    startCommand: >
      node -e "
        require('https').get(
          process.env.APP_BASE_URL + '/api/cron/tick',
          { headers: { Authorization: 'Bearer ' + process.env.CRON_SECRET } },
          (r) => { process.exitCode = r.statusCode >= 400 ? 1 : 0; }
        ).on('error', () => { process.exitCode = 1; });
      "
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: mission-wlw-cron-pharmacy-tracking
    runtime: node
    schedule: "*/15 * * * *"  # every 15 minutes
    buildCommand: echo "cron has no build step (uses Node built-ins only)"
    startCommand: node scripts/run-pharmacy-tracking-cron.mjs
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: APP_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  # All daily/hourly jobs (identity-reminders, refill-reminders,
  # reorder-enroll-reminders, delivery-checkins, winback, intake-abandonment,
  # weekly-checkins, dose-escalation, retatrutide-blast, subscription-billing)
  # are now dispatched by the single hourly mission-wlw-cron-tick above. Their
  # /api/cron/* endpoints still exist and are called by the tick dispatcher.

  - type: web
    name: mission-wlw-practiceq-remote
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev
    startCommand: node -r tsconfig-paths/register -r ts-node/register/transpile-only scripts/practiceq-remote-server.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: POSTGRES_URL
        fromDatabase:
          name: mission-wlw-postgres
          property: connectionString
      - key: POSTGRES_URL_NON_POOLING
        fromDatabase:
          name: mission-wlw-postgres
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: mission-wlw-postgres
          property: connectionString
      - key: PRACTICEQ_REMOTE_PUBLIC_URL
        value: https://mission-wlw-practiceq-remote.onrender.com
      - key: USE_REAL_PRACTICEQ
        value: true
      - key: PRACTICEQ_API_KEY
        sync: false
      - key: PRACTICEQ_BASE_URL
        value: https://intakeq.com/api/v1
      - key: PRACTICEQ_QUESTIONNAIRE_ID
        sync: false
      - key: PRACTICEQ_ADMIN_EMAIL
        sync: false
      - key: PRACTICEQ_ADMIN_PASSWORD
        sync: false
      - key: PRACTICEQ_ADMIN_SET_COMPLETED
        value: true
      - key: PRACTICEQ_ADMIN_STORAGE_STATE_JSON
        sync: false
      - key: USE_REAL_SPRUCE
        sync: false
      - key: SPRUCE_AUTH_TOKEN
        sync: false
      - key: SPRUCE_ACCESS_ID
        sync: false
      - key: SPRUCE_API_KEY
        sync: false
      - key: SPRUCE_INTERNAL_ENDPOINT_ID
        sync: false
      - key: PHARMACY_PROVIDER
        value: lifefile
      - key: USE_REAL_LIFEFILE
        value: true
      - key: LIFEFILE_ENVIRONMENT
        value: production
      - key: LIFEFILE_BASE_URL
        value: https://host37a.lifefile.net/lfapi/v1
      - key: LIFEFILE_VENDOR_ID
        sync: false
      - key: LIFEFILE_LOCATION_ID
        sync: false
      - key: LIFEFILE_API_NETWORK_ID
        sync: false
      - key: LIFEFILE_API_USERNAME
        sync: false
      - key: LIFEFILE_API_PASSWORD
        sync: false
      - key: LIFEFILE_PRACTICE_ID
        sync: false
      - key: LIFEFILE_ORDER_ENDPOINT
        sync: false
      - key: LIFEFILE_PRESCRIBER_NPI
        sync: false
      - key: LIFEFILE_PRESCRIBER_LICENSE_STATE
        sync: false
      - key: LIFEFILE_PRESCRIBER_LICENSE_NUMBER
        sync: false
      - key: LIFEFILE_PRESCRIBER_FIRST_NAME
        sync: false
      - key: LIFEFILE_PRESCRIBER_LAST_NAME
        sync: false
      - key: LIFEFILE_PRESCRIBER_EMAIL
        sync: false
      - key: LIFEFILE_SHIPPING_SERVICE_ID
        value: 6230
      - key: IDENTITY_STORAGE_PROVIDER
        value: practiceq
      - key: IDENTITY_SANDBOX_AUTO_VERIFY
        value: true
      - key: USE_REAL_APPSHEET
        value: "false"
      - key: APPSHEET_ID
        sync: false
      - key: APPSHEET_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
