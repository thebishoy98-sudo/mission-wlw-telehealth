services:
  - type: web
    name: mission-wlw-practiceq-remote
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.practiceq-remote
    envVars:
      - key: PRACTICEQ_REMOTE_HEADLESS
        value: "true"
      - key: PRACTICEQ_REMOTE_POLL_MS
        value: "5000"
      - key: PRACTICEQ_REMOTE_PUBLIC_URL
        sync: false
      - key: PRACTICEQ_ADMIN_SET_COMPLETED
        value: "true"
      - key: PRACTICEQ_ADMIN_EMAIL
        sync: false
      - key: PRACTICEQ_ADMIN_PASSWORD
        sync: false
      - key: PRACTICEQ_ADMIN_STORAGE_STATE_JSON
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_URL_NON_POOLING
        sync: false
