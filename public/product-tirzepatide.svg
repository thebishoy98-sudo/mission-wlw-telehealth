<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Background -->
  <rect width="600" height="400" fill="#f0fdfa"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ccfbf1" stroke-width="1"/>
    </pattern>
    <linearGradient id="penGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="penBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="40%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0d948820" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="80" fill="#ccfbf1" opacity="0.4"/>
  <circle cx="560" cy="360" r="100" fill="#ccfbf1" opacity="0.4"/>
  <circle cx="300" cy="380" r="60" fill="#99f6e4" opacity="0.2"/>

  <!-- ── Auto-injector pen (horizontal, centered) ── -->
  <g transform="translate(80, 155)" filter="url(#shadow)">

    <!-- Needle tip cap (left end) -->
    <rect x="0" y="38" width="18" height="24" rx="4" fill="#94a3b8"/>
    <rect x="3" y="41" width="12" height="18" rx="3" fill="#cbd5e1"/>
    <!-- Needle -->
    <rect x="18" y="47" width="14" height="6" rx="1" fill="#94a3b8"/>

    <!-- Main pen body -->
    <rect x="32" y="22" width="310" height="56" rx="14" fill="url(#penBody)" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Teal brand band -->
    <rect x="32" y="22" width="80" height="56" rx="0" fill="url(#tealGrad)"/>
    <rect x="32" y="22" width="18" height="56" rx="14 0 0 14" fill="url(#tealGrad)"/>
    <!-- Round left corners of band -->
    <rect x="32" y="22" width="24" height="56" rx="14" fill="url(#tealGrad)"/>
    <rect x="56" y="22" width="56" height="56" fill="url(#tealGrad)"/>

    <!-- Window / dose indicator -->
    <rect x="135" y="30" width="60" height="40" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <rect x="139" y="34" width="52" height="32" rx="4" fill="#eff6ff"/>
    <!-- Dose marking lines -->
    <line x1="150" y1="38" x2="150" y2="62" stroke="#bfdbfe" stroke-width="1"/>
    <line x1="160" y1="38" x2="160" y2="62" stroke="#bfdbfe" stroke-width="1"/>
    <line x1="170" y1="38" x2="170" y2="62" stroke="#bfdbfe" stroke-width="1"/>
    <line x1="180" y1="38" x2="180" y2="62" stroke="#bfdbfe" stroke-width="1"/>
    <line x1="145" y1="50" x2="182" y2="50" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Liquid inside window -->
    <rect x="139" y="42" width="52" height="24" rx="3" fill="#bfdbfe" opacity="0.5"/>

    <!-- Grip ridges -->
    <rect x="215" y="27" width="4" height="46" rx="2" fill="#e2e8f0"/>
    <rect x="223" y="27" width="4" height="46" rx="2" fill="#e2e8f0"/>
    <rect x="231" y="27" width="4" height="46" rx="2" fill="#e2e8f0"/>
    <rect x="239" y="27" width="4" height="46" rx="2" fill="#e2e8f0"/>
    <rect x="247" y="27" width="4" height="46" rx="2" fill="#e2e8f0"/>

    <!-- Injection button end (right) -->
    <rect x="342" y="22" width="52" height="56" rx="0 14 14 0" fill="url(#capGrad)"/>
    <rect x="330" y="22" width="64" height="56" rx="14" fill="url(#capGrad)"/>
    <!-- Button detail -->
    <circle cx="366" cy="50" r="14" fill="#0d9488" opacity="0.4"/>
    <circle cx="366" cy="50" r="8" fill="#ffffff" opacity="0.6"/>

    <!-- Brand label on teal section -->
    <text x="58" y="46" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" letter-spacing="1">GLP-1</text>
    <text x="55" y="60" font-family="Arial, sans-serif" font-size="7" fill="#ccfbf1" letter-spacing="0.5">WEEKLY</text>

    <!-- Dose label -->
    <text x="165" y="48" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e40af" text-anchor="middle">2.5mg</text>

    <!-- Pen shine highlight -->
    <rect x="32" y="24" width="310" height="10" rx="8" fill="white" opacity="0.35"/>

  </g>

  <!-- ── Label card ── -->
  <rect x="200" y="290" width="200" height="68" rx="12" fill="white" stroke="#ccfbf1" stroke-width="1.5"/>
  <text x="300" y="315" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">Tirzepatide</text>
  <text x="300" y="332" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle" font-weight="600">GLP-1/GIP Receptor Agonist</text>
  <text x="300" y="348" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Weekly Injectable · 6-Week Plan</text>

  <!-- Decorative pills / dots -->
  <circle cx="150" cy="310" r="6" fill="#0d9488" opacity="0.15"/>
  <circle cx="165" cy="295" r="4" fill="#0d9488" opacity="0.2"/>
  <circle cx="140" cy="325" r="3" fill="#14b8a6" opacity="0.25"/>
  <circle cx="450" cy="310" r="6" fill="#0d9488" opacity="0.15"/>
  <circle cx="435" cy="295" r="4" fill="#0d9488" opacity="0.2"/>
  <circle cx="460" cy="325" r="3" fill="#14b8a6" opacity="0.25"/>

  <!-- Small molecule decorations -->
  <circle cx="510" cy="80" r="5" fill="#0d9488" opacity="0.3"/>
  <line x1="510" y1="80" x2="530" y2="95" stroke="#0d9488" stroke-width="1.5" opacity="0.3"/>
  <circle cx="530" cy="95" r="4" fill="#14b8a6" opacity="0.3"/>
  <line x1="530" y1="95" x2="545" y2="78" stroke="#0d9488" stroke-width="1.5" opacity="0.3"/>
  <circle cx="545" cy="78" r="3" fill="#0d9488" opacity="0.3"/>
  <line x1="530" y1="95" x2="520" y2="115" stroke="#0d9488" stroke-width="1.5" opacity="0.3"/>
  <circle cx="520" cy="115" r="3" fill="#14b8a6" opacity="0.3"/>

  <circle cx="80" cy="320" r="4" fill="#0d9488" opacity="0.2"/>
  <line x1="80" y1="320" x2="65" y2="335" stroke="#0d9488" stroke-width="1.5" opacity="0.2"/>
  <circle cx="65" cy="335" r="3" fill="#14b8a6" opacity="0.2"/>
  <line x1="65" y1="335" x2="75" y2="350" stroke="#0d9488" stroke-width="1.5" opacity="0.2"/>
  <circle cx="75" cy="350" r="3" fill="#0d9488" opacity="0.2"/>
</svg>
